# k8s-agent Configuration File
# =============================================================================
# ALL AVAILABLE CONFIGURATION OPTIONS
# =============================================================================
# Location: ~/.config/k8s-agent/config.yaml (default)
# Or use: k8s-agent --config /path/to/config.yaml
# Or set: K8S_AGENT_CONFIG=/path/to/config.yaml
#
# PRIORITY: --config flag > K8S_AGENT_CONFIG env > this file > env vars > defaults
# =============================================================================

# -----------------------------------------------------------------------------
# CLUSTER CONFIGURATION
# -----------------------------------------------------------------------------
current-cluster: "default"              # 当前默认集群上下文

# -----------------------------------------------------------------------------
# LLM CONFIGURATION
# -----------------------------------------------------------------------------
llm:
  # LLM Provider: openai, anthropic, ollama
  provider: "openai"

  # API Key (推荐通过环境变量设置)
  # 环境变量: OPENAI_API_KEY, ANTHROPIC_API_KEY, LLM_API_KEY
  api-key: ""

  # 模型名称
  # 环境变量: OPENAI_MODEL, ANTHROPIC_MODEL, LLM_MODEL
  model: "gpt-4"

  # API Base URL (支持自定义端点，如代理服务)
  # 环境变量: OPENAI_BASE_URL, LLM_BASE_URL
  base-url: ""

  # 请求超时时间 (秒)
  timeout: 30.0

  # 采样温度 (0.0 - 2.0)
  # 低值 = 更确定/聚焦, 高值 = 更随机/创意
  temperature: 0.7

  # LLM 响应最大 Token 数
  max-tokens: 4000

# -----------------------------------------------------------------------------
# CONTEXT MANAGEMENT (上下文管理)
# -----------------------------------------------------------------------------
context:
  # 上下文窗口保留的最大消息数
  # 越多 = 上下文越丰富，但 Token 消耗越高
  max-messages: 20

  # 上下文窗口最大 Token 数 (估算值)
  # 当超过此限制时，会截断早期消息
  max-tokens: 8000

  # 是否启用对话摘要
  # 启用后，超出 max-messages 的早期消息会被摘要
  summary-enabled: true

  # 摘要阈值 - 当消息数达到此值时开始摘要
  summary-threshold: 10

  # Level 1压缩时保留的最新工具调用数量
  # 丢弃旧工具调用信息时，保留最近的这几条
  tool-call-retention: 10

# -----------------------------------------------------------------------------
# LOGGING (日志)
# -----------------------------------------------------------------------------
logging:
  # 日志级别: debug, info, warn, error
  level: "info"

  # 日志格式: json, text
  format: "text"

# -----------------------------------------------------------------------------
# SESSION (会话持久化)
# -----------------------------------------------------------------------------
session:
  # 会话存储路径 (每个会话存为一个 .jsonl 文件)
  # 默认: ~/.config/k8s-agent/sessions
  # 设置为空则仅使用内存存储 (程序退出后会话丢失)
  storage-path: "~/.config/k8s-agent/sessions"

  # 内存缓存的最大会话数 (默认: 100)
  # 超出时淘汰最久未使用的会话
  max-cache-size: 100

  # 持久化存储的最大会话文件数 (默认: 10)
  # 超出时删除最旧的会话文件
  max-sessions: 10

# =============================================================================
# ENVIRONMENT VARIABLES (环境变量备选方案)
# =============================================================================
# 当配置文件中的值为空时，自动使用环境变量作为备选
#
# LLM 相关:
#   LLM_PROVIDER          - Provider 类型
#   OPENAI_API_KEY       - OpenAI API Key
#   ANTHROPIC_API_KEY    - Anthropic API Key
#   LLM_API_KEY          - 通用 API Key
#   OPENAI_MODEL         - OpenAI 模型
#   ANTHROPIC_MODEL      - Anthropic 模型
#   LLM_MODEL            - 通用模型
#   OPENAI_BASE_URL      - OpenAI Base URL
#   LLM_BASE_URL         - 通用 Base URL
#   LLM_TIMEOUT          - 请求超时 (秒)
#   LLM_TEMPERATURE      - 采样温度
#   LLM_MAX_TOKENS       - 最大 Token 数
#
# Context 相关:
#   CONTEXT_MAX_MESSAGES     - 最大消息数
#   CONTEXT_MAX_TOKENS       - 最大 Token 数
#   CONTEXT_SUMMARY_ENABLED   - 是否启用摘要 (true/false)
#
# 其他:
#   K8S_AGENT_CONFIG     - 配置文件路径
# =============================================================================